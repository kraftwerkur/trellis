# Unified demo: Trellis + Intake
# Usage: docker compose up --build

services:
  trellis:
    build: .
    ports:
      - "8100:8000"
    environment:
      - TRELLIS_ENV=demo
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  intake:
    build: ../intake
    environment:
      - TRELLIS_URL=http://trellis:8000
    depends_on:
      trellis:
        condition: service_healthy
    restart: unless-stopped
